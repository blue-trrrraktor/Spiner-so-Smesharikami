<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Смешарик Спиннер | С картинками</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #1b4d2e 0%, #0e3a22 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Quicksand', system-ui, -apple-system, 'Comic Neue', sans-serif;
            padding: 20px;
            overflow-x: hidden;
        }

        .game-container {
            background: rgba(255,248,205,0.88);
            backdrop-filter: blur(4px);
            border-radius: 80px 80px 70px 70px;
            padding: 35px 25px 40px 25px;
            box-shadow: 0 25px 40px rgba(0,0,0,0.4), inset 0 1px 4px rgba(255,255,200,0.8);
        }

        .spinner-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 35px;
            position: relative;
        }

        .spinner {
            position: relative;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle at 30% 30%, #ffefb0, #f7d98c);
            border-radius: 50%;
            box-shadow: 0 20px 30px rgba(0,0,0,0.3), inset 0 0 0 8px #ffdfa5, inset 0 0 0 12px #e8b56e;
            cursor: pointer;
            will-change: transform;
        }

        .spinner-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 96px;
            height: 96px;
            background: radial-gradient(circle, #f5e7b2, #e7bc6e);
            border-radius: 50%;
            box-shadow: 0 4px 14px rgba(0,0,0,0.4), inset 0 2px 4px rgba(255,255,200,0.8);
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            font-family: 'Segoe UI', cursive;
            color: #aa7c3c;
            text-shadow: 0 1px 0 white;
            border: 2px solid #ffcd94;
            backdrop-filter: blur(2px);
            pointer-events: none;
        }
        .spinner-center span {
            transform: rotate(-5deg);
            background: rgba(255,245,190,0.8);
            padding: 6px 12px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: bold;
        }

        .petal {
            position: absolute;
            width: 98px;
            height: 98px;
            border-radius: 50%;
            background: #fff3dd;
            box-shadow: 0 8px 14px rgba(0, 0, 0, 0.25), inset 0 1px 3px rgba(255,255,200,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            border: 2px solid #ffcf8a;
            overflow: hidden;
        }
        
        .petal img {
            width: 100%;
            height: 100%;
            object-fit: contain;   /* картинка вписывается в кружок, виден весь персонаж */
            border-radius: 50%;
            background: #fff3dd;    /* фон на случай прозрачности */
            pointer-events: none;
        }
        
        .btn-spin {
            background: #ffbc6e;
            border: none;
            font-size: 2.2rem;
            font-weight: bold;
            font-family: inherit;
            padding: 14px 34px;
            border-radius: 60px;
            color: #45290c;
            cursor: pointer;
            box-shadow: 0 10px 0 #9b5e2c;
            transition: 0.07s linear;
            text-transform: uppercase;
            letter-spacing: 3px;
            display: block;
            margin: 0 auto;
            width: fit-content;
            background: linear-gradient(135deg, #ffcf6e, #ffa843);
            text-shadow: 0 1px 0 #ffeaaf;
        }
        
        .btn-spin:active {
            transform: translateY(5px);
            box-shadow: 0 4px 0 #9b5e2c;
        }
        
        .caption {
            text-align: center;
            margin-top: 20px;
            font-weight: bold;
            color: #fff1b5;
            text-shadow: 2px 2px 0 #6b3f1c;
            font-size: 1rem;
            background: rgba(0,0,0,0.3);
            display: inline-block;
            width: auto;
            border-radius: 50px;
            padding: 5px 20px;
            backdrop-filter: blur(2px);
        }

        /* Адаптив */
        @media (max-width: 620px) {
            .spinner {
                width: 380px;
                height: 380px;
            }
            .petal {
                width: 74px;
                height: 74px;
            }
            .spinner-center {
                width: 74px;
                height: 74px;
                font-size: 1.4rem;
            }
            .spinner-center span {
                font-size: 0.75rem;
                padding: 3px 8px;
            }
            .btn-spin {
                font-size: 1.6rem;
                padding: 10px 28px;
            }
        }

        @media (max-width: 480px) {
            .spinner {
                width: 320px;
                height: 320px;
            }
            .petal {
                width: 64px;
                height: 64px;
            }
            .spinner-center {
                width: 64px;
                height: 64px;
            }
        }

        .spinner-wrapper::before {
            content: "✨";
            position: absolute;
            font-size: 32px;
            left: -20px;
            top: 20px;
            opacity: 0.7;
            pointer-events: none;
        }
        .spinner-wrapper::after {
            content: "🌀";
            position: absolute;
            font-size: 36px;
            right: -20px;
            bottom: 10px;
            opacity: 0.6;
            pointer-events: none;
            transform: rotate(20deg);
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="spinner-wrapper">
        <div class="spinner" id="spinner">
            <div class="spinner-center"><span>⚡ КРУТИ!</span></div>
        </div>
    </div>
    <button class="btn-spin" id="spinBtn">🌀 КРУТИТЬ! 🌀</button>
    <div style="display: flex; justify-content: center; margin-top: 14px;">
        <div class="caption">🍭 9 смешариков | нажми «Крутить!» — спиннер вращается, ещё раз — плавно останавливается 🍬</div>
    </div>
</div>

<script>
    (function() {
        // ----- Имена персонажей (для alt и порядка) -----
        const characters = [
            { name: "Крош",     file: "krosh.png" },
            { name: "Нюша",     file: "nyusha.png" },
            { name: "Бараш",    file: "barash.png" },
            { name: "Лосяш",    file: "losyash.png" },
            { name: "Совунья",  file: "sovunya.png" },
            { name: "Копатыч",  file: "kopatych.png" },
            { name: "Ёжик",     file: "ezhik.png" },
            { name: "Пин",      file: "pin.png" },
            { name: "Кар-Карыч",file: "karkarych.png" }
        ];
        
        const petalCount = characters.length;
        const spinnerElem = document.getElementById('spinner');
        const spinBtn = document.getElementById('spinBtn');
        
        // ---------- Построение спиннера: вместо SVG вставляем <img> из папки images ----------
        function buildSpinner() {
            // сохраним центральный элемент (он будет пересоздан)
            const oldCenter = spinnerElem.querySelector('.spinner-center');
            spinnerElem.innerHTML = '';
            
            for (let i = 0; i < petalCount; i++) {
                const petalDiv = document.createElement('div');
                petalDiv.classList.add('petal');
                
                const img = document.createElement('img');
                // путь к картинке: папка images/ + имя файла
                img.src = `images/${characters[i].file}`;
                img.alt = characters[i].name;
                // обработчик ошибки на случай, если картинка не загрузится (покажем имя)
                img.onerror = function() {
                    this.style.objectFit = "none";
                    this.alt = characters[i].name;
                };
                
                petalDiv.appendChild(img);
                spinnerElem.appendChild(petalDiv);
            }
            // восстановить центральную кнопку
            if (oldCenter) {
                spinnerElem.appendChild(oldCenter);
            } else {
                const newCenter = document.createElement('div');
                newCenter.classList.add('spinner-center');
                newCenter.innerHTML = '<span>⚡ КРУТИ!</span>';
                spinnerElem.appendChild(newCenter);
            }
            // пересчитать позиции лепестков
            updatePetalsPosition();
        }
        
        // ----- Геометрия лепестков (чтобы были ровно по кругу) -----
        function updatePetalsPosition() {
            const petals = document.querySelectorAll('.petal');
            if (!petals.length) return;
            const spinnerRect = spinnerElem.getBoundingClientRect();
            const containerWidth = spinnerRect.width;
            const centerX = containerWidth / 2;
            const centerY = containerWidth / 2;
            
            let petalWidth = 98;
            if (containerWidth < 400) petalWidth = 74;
            if (containerWidth < 340) petalWidth = 64;
            // радиус от центра спиннера до центра лепестка
            let dynamicRadius = (containerWidth / 2) - (petalWidth / 2) - 12;
            if (dynamicRadius < 65) dynamicRadius = 65;
            
            petals.forEach((petal, idx) => {
                const angle = (idx / petalCount) * Math.PI * 2;
                const x = centerX + dynamicRadius * Math.cos(angle) - (petalWidth / 2);
                const y = centerY + dynamicRadius * Math.sin(angle) - (petalWidth / 2);
                petal.style.left = `${x}px`;
                petal.style.top = `${y}px`;
                petal.style.width = `${petalWidth}px`;
                petal.style.height = `${petalWidth}px`;
                // картинка внутри адаптируется автоматически через CSS
            });
        }
        
        // ---------- Плавное вращение и остановка с замедлением ----------
        let currentAngle = 0;          // текущий угол поворота (градусы)
        let angularSpeed = 0;          // скорость (градусов на кадр)
        let animFrameId = null;
        let isSpinningActive = false;   // крутится ли спиннер (не считая замедления)
        let isStopping = false;         // находится ли в процессе торможения
        
        const BASE_SPEED = 11;          // постоянная скорость при вращении
        const DECAY_FACTOR = 0.96;      // коэффициент замедления
        const STOP_THRESHOLD = 0.15;    // порог остановки
        
        function updateRotation() {
            if (!animFrameId) return;
            
            currentAngle += angularSpeed;
            currentAngle = currentAngle % 360;
            spinnerElem.style.transform = `rotate(${currentAngle}deg)`;
            
            if (isSpinningActive && !isStopping) {
                // режим активного вращения: скорость постоянная
                angularSpeed = BASE_SPEED;
                animFrameId = requestAnimationFrame(updateRotation);
            } 
            else if (isStopping) {
                // режим замедления
                angularSpeed *= DECAY_FACTOR;
                if (Math.abs(angularSpeed) < STOP_THRESHOLD) {
                    // полная остановка
                    angularSpeed = 0;
                    isSpinningActive = false;
                    isStopping = false;
                    cancelAnimationFrame(animFrameId);
                    animFrameId = null;
                    // меняем текст кнопки обратно
                    spinBtn.innerHTML = "🌀 КРУТИТЬ! 🌀";
                    spinBtn.style.background = "linear-gradient(135deg, #ffcf6e, #ffa843)";
                } else {
                    animFrameId = requestAnimationFrame(updateRotation);
                }
            }
            else {
                // полностью остановлен — завершаем анимацию
                if (animFrameId) {
                    cancelAnimationFrame(animFrameId);
                    animFrameId = null;
                }
            }
        }
        
        function startSpin() {
            if (animFrameId) return; // уже что-то происходит
            isSpinningActive = true;
            isStopping = false;
            angularSpeed = BASE_SPEED;
            animFrameId = requestAnimationFrame(updateRotation);
            spinBtn.innerHTML = "⏹️ СТОП! ⏹️";
            spinBtn.style.background = "linear-gradient(135deg, #ff9f4a, #e07c2c)";
        }
        
        function stopSpinSmooth() {
            if (!isSpinningActive || isStopping) return;
            // начинаем торможение
            isStopping = true;
            // скорость уже есть, будет постепенно уменьшаться в updateRotation
        }
        
        function toggleSpin() {
            if (isSpinningActive && !isStopping) {
                stopSpinSmooth();   // если крутится — останавливаем плавно
            } else if (!isSpinningActive && !animFrameId) {
                startSpin();        // если стоит — запускаем
            }
            // если уже останавливается — игнорируем повторный клик
        }
        
        // ---------- Инициализация и подгонка при ресайзе ----------
        window.addEventListener('resize', () => {
            if (spinnerElem) updatePetalsPosition();
        });
        
        buildSpinner();
        spinBtn.addEventListener('click', toggleSpin);
        // дополнительный пересчёт после загрузки картинок (чтобы позиции стали точными)
        setTimeout(() => updatePetalsPosition(), 100);
    })();
</script>
</body>
</html>
