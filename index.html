<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Смешарик Спиннер | 9 героев | Плавная остановка</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #1b4d2e 0%, #0e3a22 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Quicksand', system-ui, -apple-system, 'Comic Neue', sans-serif;
            padding: 20px;
            overflow-x: hidden;
        }

        /* карточка-контейнер */
        .game-container {
            background: rgba(255,248,205,0.88);
            backdrop-filter: blur(4px);
            border-radius: 80px 80px 70px 70px;
            padding: 35px 25px 40px 25px;
            box-shadow: 0 25px 40px rgba(0,0,0,0.4), inset 0 1px 4px rgba(255,255,200,0.8);
            transition: all 0.2s ease;
        }

        .spinner-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 35px;
            position: relative;
        }

        .spinner {
            position: relative;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle at 30% 30%, #ffefb0, #f7d98c);
            border-radius: 50%;
            box-shadow: 0 20px 30px rgba(0,0,0,0.3), inset 0 0 0 8px #ffdfa5, inset 0 0 0 12px #e8b56e;
            transition: box-shadow 0.2s;
            cursor: pointer;
            will-change: transform;
        }

        /* центральная ось — тоже вращается вместе со спиннером (как настоящий спиннер) */
        .spinner-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 96px;
            height: 96px;
            background: radial-gradient(circle, #f5e7b2, #e7bc6e);
            border-radius: 50%;
            box-shadow: 0 4px 14px rgba(0,0,0,0.4), inset 0 2px 4px rgba(255,255,200,0.8);
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            font-family: 'Segoe UI', cursive;
            color: #aa7c3c;
            text-shadow: 0 1px 0 white;
            border: 2px solid #ffcd94;
            backdrop-filter: blur(2px);
            pointer-events: none;
        }
        .spinner-center span {
            transform: rotate(-5deg);
            background: rgba(255,245,190,0.8);
            padding: 6px 12px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: bold;
        }

        /* каждый лепесток — круглый с персонажем */
        .petal {
            position: absolute;
            width: 98px;
            height: 98px;
            border-radius: 50%;
            background: #fff3dd;
            box-shadow: 0 8px 14px rgba(0, 0, 0, 0.25), inset 0 1px 3px rgba(255,255,200,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.05s ease;
            z-index: 10;
            border: 2px solid #ffcf8a;
        }
        
        .petal svg {
            width: 88px;
            height: 88px;
            filter: drop-shadow(0 2px 3px rgba(0,0,0,0.2));
            transition: transform 0.2s;
        }
        
        /* кнопка с характером */
        .btn-spin {
            background: #ffbc6e;
            border: none;
            font-size: 2.2rem;
            font-weight: bold;
            font-family: inherit;
            padding: 14px 34px;
            border-radius: 60px;
            color: #45290c;
            cursor: pointer;
            box-shadow: 0 10px 0 #9b5e2c;
            transition: 0.07s linear;
            text-transform: uppercase;
            letter-spacing: 3px;
            display: block;
            margin: 0 auto;
            width: fit-content;
            background: linear-gradient(135deg, #ffcf6e, #ffa843);
            text-shadow: 0 1px 0 #ffeaaf;
        }
        
        .btn-spin:active {
            transform: translateY(5px);
            box-shadow: 0 4px 0 #9b5e2c;
        }
        
        .caption {
            text-align: center;
            margin-top: 20px;
            font-weight: bold;
            color: #fff1b5;
            text-shadow: 2px 2px 0 #6b3f1c;
            font-size: 1rem;
            background: rgba(0,0,0,0.3);
            display: inline-block;
            width: auto;
            border-radius: 50px;
            padding: 5px 20px;
            backdrop-filter: blur(2px);
        }
        
        /* адаптив */
        @media (max-width: 620px) {
            .spinner {
                width: 380px;
                height: 380px;
            }
            .petal {
                width: 74px;
                height: 74px;
            }
            .petal svg {
                width: 66px;
                height: 66px;
            }
            .spinner-center {
                width: 74px;
                height: 74px;
                font-size: 1.4rem;
            }
            .spinner-center span {
                font-size: 0.75rem;
                padding: 3px 8px;
            }
            .btn-spin {
                font-size: 1.6rem;
                padding: 10px 28px;
            }
        }

        @media (max-width: 480px) {
            .spinner {
                width: 320px;
                height: 320px;
            }
            .petal {
                width: 64px;
                height: 64px;
            }
            .petal svg {
                width: 56px;
                height: 56px;
            }
            .spinner-center {
                width: 64px;
                height: 64px;
            }
        }

        .spinner-wrapper::before {
            content: "✨";
            position: absolute;
            font-size: 32px;
            left: -20px;
            top: 20px;
            opacity: 0.7;
            pointer-events: none;
        }
        .spinner-wrapper::after {
            content: "🌀";
            position: absolute;
            font-size: 36px;
            right: -20px;
            bottom: 10px;
            opacity: 0.6;
            pointer-events: none;
            transform: rotate(20deg);
        }
    </style>
</head>

            for (let i = 0; i < 12; i++) {

            eyeR.setAttribute("cx", "66"); eyeR.setAttribute("cy", "46"); eyeR.setAttribute("r", "7"); eyeR.setAttribute("fill", "white");
            svg.appendChild(eyeR);
            const pupilL = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            pupilL.setAttribute("cx", "36"); pupilL.setAttribute("cy", "46"); pupilL.setAttribute("r", "3"); pupilL.setAttribute("fill", "#1F1A0E");
            svg.appendChild(pupilL);
            const pupilR = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            pupilR.setAttribute("cx", "68"); pupilR.setAttribute("cy", "46"); pupilR.setAttribute("r", "3"); pupilR.setAttribute("fill", "#1F1A0E");
            svg.appendChild(pupilR);
            const nose = document.createElementNS("http://www.w3.org/2000/svg", "ellipse");
            nose.setAttribute("cx", "50"); nose.setAttribute("cy", "62"); nose.setAttribute("rx", "6"); nose.setAttribute("ry", "5"); nose.setAttribute("fill", "#512A10");
            svg.appendChild(nose);
            return svg;
        }

        // Пингвин Пин
        function createPinSVG(color, accent) {

            svg.appendChild(eyeL);
            const eyeR = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            eyeR.setAttribute("cx", "66"); eyeR.setAttribute("cy", "44"); eyeR.setAttribute("r", "6"); eyeR.setAttribute("fill", "white");
            svg.appendChild(eyeR);
            const pupilL = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            pupilL.setAttribute("cx", "36"); pupilL.setAttribute("cy", "44"); pupilL.setAttribute("r", "3"); pupilL.setAttribute("fill", "black");
            svg.appendChild(pupilL);
            const pupilR = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            pupilR.setAttribute("cx", "68"); pupilR.setAttribute("cy", "44"); pupilR.setAttribute("r", "3"); pupilR.setAttribute("fill", "black");
            svg.appendChild(pupilR);
            const beak = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
            beak.setAttribute("points", "45,56 55,56 50,66"); beak.setAttribute("fill", "#F5BC42");
            svg.appendChild(beak);
            const glasses = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            glasses.setAttribute("cx", "34"); glasses.setAttribute("cy", "44"); glasses.setAttribute("r", "9"); glasses.setAttribute("fill", "none"); glasses.setAttribute("stroke", "#644117"); glasses.setAttribute("stroke-width", "2");
            svg.appendChild(glasses);
            const glassesR = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            glassesR.setAttribute("cx", "66"); glassesR.setAttribute("cy", "44"); glassesR.setAttribute("r", "9"); glassesR.setAttribute("fill", "none"); glassesR.setAttribute("stroke", "#644117"); glassesR.setAttribute("stroke-width", "2");
            svg.appendChild(glassesR);

        // Кар-Карыч (ворона в шляпе)
        function createKarKarychSVG(color, accent) {
            const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
            svg.setAttribute("viewBox", "0 0 100 100");
            const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            circle.setAttribute("cx", "50"); circle.setAttribute("cy", "50"); circle.setAttribute("r", "46");
            circle.setAttribute("fill", color); circle.setAttribute("stroke", "#4F3B6F"); circle.setAttribute("stroke-width", "2");
            svg.appendChild(circle);
            const hat = document.createElementNS("http://www.w3.org/2000/svg", "rect");
            hat.setAttribute("x", "35"); hat.setAttribute("y", "18"); hat.setAttribute("width", "30"); hat.setAttribute("height", "18"); hat.setAttribute("fill", "#1E1333"); hat.setAttribute("rx", "4");
            svg.appendChild(hat);
            const hatBr = document.createElementNS("http://www.w3.org/2000/svg", "ellipse");
            hatBr.setAttribute("cx", "50"); hatBr.setAttribute("cy", "20"); hatBr.setAttribute("rx", "20"); hatBr.setAttribute("ry", "6"); hatBr.setAttribute("fill", "#2A1D42");
            svg.appendChild(hatBr);
            const eyeL = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            eyeL.setAttribute("cx", "34"); eyeL.setAttribute("cy", "48"); eyeL.setAttribute("r", "8"); eyeL.setAttribute("fill", "#F7F7A8");
            svg.appendChild(eyeL);
            const eyeR = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            eyeR.setAttribute("cx", "66"); eyeR.setAttribute("cy", "48"); eyeR.setAttribute("r", "8"); eyeR.setAttribute("fill", "#F7F7A8");
            svg.appendChild(eyeR);
            const pupilL = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            pupilL.setAttribute("cx", "36"); pupilL.setAttribute("cy", "48"); pupilL.setAttribute("r", "4"); pupilL.setAttribute("fill", "#000");
            svg.appendChild(pupilL);
            const pupilR = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            pupilR.setAttribute("cx", "68"); pupilR.setAttribute("cy", "48"); pupilR.setAttribute("r", "4"); pupilR.setAttribute("fill", "#000");
            svg.appendChild(pupilR);
            const beak = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
            beak.setAttribute("points", "46,60 54,60 50,71"); beak.setAttribute("fill", "#FFA559");
            svg.appendChild(beak);
            return svg;
        }

        const creators = [
            createKroshSVG, createNyushaSVG, createBarashSVG, createLosyashSVG, createSovunyaSVG, createKopatychSVG,
            createEzhikSVG, createPinSVG, createKarKarychSVG
        ];
        
        // ---------- ГЕОМЕТРИЯ ЛЕПЕСТКОВ ----------
        function updatePetalsPosition() {
            const petals = document.querySelectorAll('.petal');
            if (!petals.length) return;
            const spinnerRect = spinnerElem.getBoundingClientRect();
            const containerWidth = spinnerRect.width;
            const centerX = containerWidth / 2;
            const centerY = containerWidth / 2;
            let petalWidth = 98;
            if (containerWidth < 400) petalWidth = 74;
            if (containerWidth < 340) petalWidth = 64;
            let dynamicRadius = (containerWidth / 2) - (petalWidth / 2) - 12;
            if (dynamicRadius < 65) dynamicRadius = 65;
            petals.forEach((petal, idx) => {
                const angle = (idx / petalCount) * Math.PI * 2;
                const x = centerX + dynamicRadius * Math.cos(angle) - (petalWidth / 2);
                const y = centerY + dynamicRadius * Math.sin(angle) - (petalWidth / 2);
                petal.style.left = `${x}px`;
                petal.style.top = `${y}px`;
                petal.style.width = `${petalWidth}px`;
                petal.style.height = `${petalWidth}px`;
                const svgElem = petal.querySelector('svg');
                if (svgElem) {
                    svgElem.style.width = `${petalWidth - 8}px`;
                    svgElem.style.height = `${petalWidth - 8}px`;
                }
            });
        }
        
        function buildSpinner() {
            // сохраним центральный элемент
            const centerDiv = spinnerElem.querySelector('.spinner-center');
            spinnerElem.innerHTML = '';
            for (let i = 0; i < petalCount; i++) {
                const petalDiv = document.createElement('div');
                petalDiv.classList.add('petal');
                const char = characters[i];
                const svgElement = creators[i](char.color, char.accent);
                petalDiv.appendChild(svgElement);
                spinnerElem.appendChild(petalDiv);
            }
            if (centerDiv) spinnerElem.appendChild(centerDiv);
            else {
                const newCenter = document.createElement('div');
                newCenter.classList.add('spinner-center');
                newCenter.innerHTML = '<span>⚡ КРУТИ!</span>';
                spinnerElem.appendChild(newCenter);
            }
            updatePetalsPosition();
        }

        // ---------- УПРАВЛЕНИЕ ВРАЩЕНИЕМ (плавный пуск / плавная остановка в случайном угле) ----------
        let currentAngle = 0;         // градусы
        let angularSpeed = 0;          // градусы за кадр
        let animFrameId = null;
        let isSpinningActive = false;   // вращается или замедляется?
        let isStopping = false;          // флаг, чтобы не повторять остановку
        
        const BASE_SPEED = 11;           // скорость вращения при активном кручении (градусов/кадр ~ 660°/сек)
        const DECAY_FACTOR = 0.96;       // плавное замедление
        const STOP_THRESHOLD = 0.15;     // остановиться, когда скорость ниже
        
        function updateRotation() {
            if (!animFrameId) return;
            currentAngle += angularSpeed;
            currentAngle = currentAngle % 360;
            spinnerElem.style.transform = `rotate(${currentAngle}deg)`;
            if (isSpinningActive && !isStopping) {
                // обычное вращение с постоянной скоростью
                angularSpeed = BASE_SPEED;
                animFrameId = requestAnimationFrame(updateRotation);
            } 
            else if (isStopping) {
                // замедление
                angularSpeed *= DECAY_FACTOR;
                if (Math.abs(angularSpeed) < STOP_THRESHOLD) {
                    // полная остановка
                    angularSpeed = 0;
                    isSpinningActive = false;
                    isStopping = false;
                    cancelAnimationFrame(animFrameId);
                    animFrameId = null;
                    spinBtn.innerHTML = "🌀 КРУТИТЬ! 🌀";
                    spinBtn.style.background = "linear-gradient(135deg, #ffcf6e, #ffa843)";
                } else {
                    animFrameId = requestAnimationFrame(updateRotation);
                }
            }
            else {
                // полностью остановлено — ничего не делаем, но если анимация ещё идёт, завершаем
                if (animFrameId) {
                    cancelAnimationFrame(animFrameId);
                    animFrameId = null;
                }
            }
        }
        
        function startSpin() {
            if (animFrameId) {
                // если уже крутится или тормозит — ничего не делаем (защита)
                return;
            }
            isSpinningActive = true;
            isStopping = false;
            angularSpeed = BASE_SPEED;
            animFrameId = requestAnimationFrame(updateRotation);
            spinBtn.innerHTML = "⏹️ СТОП! ⏹️";
            spinBtn.style.background = "linear-gradient(135deg, #ff9f4a, #e07c2c)";
        }
        
        function stopSpinSmooth() {
            if (!isSpinningActive || isStopping) return;   // уже останавливаемся или не вращается
            isStopping = true;
            // скорость уже есть, продолжим замедление в updateRotation
            // не меняем кнопку пока не остановимся полностью
        }
        
        function toggleSpin() {
            if (isSpinningActive && !isStopping) {
                // крутится -> останавливаем плавно
                stopSpinSmooth();
            } else if (!isSpinningActive && !animFrameId) {
                // полностью остановлен -> запускаем вращение
                startSpin();
            }
            // если процесс остановки уже идёт — игнорируем повторный клик
        }
        
        // пересчёт позиций при ресайзе
        window.addEventListener('resize', () => {
            if (spinnerElem) updatePetalsPosition();
        });
        
        buildSpinner();
        spinBtn.addEventListener('click', toggleSpin);
        setTimeout(() => updatePetalsPosition(), 50);
    })();
</script>
